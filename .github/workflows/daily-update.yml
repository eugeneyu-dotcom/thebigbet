name: Daily World Cup Data Update

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ⚠️  IMPORTANT — CSV prediction safety order:
      #   generate_expert_csv.mjs merges humanPredictions.json (JSON) + EXPERT_PREDICTIONS.csv (CSV).
      #   JSON is loaded first, CSV overlays it, so both sources are preserved.
      #   To avoid conflicts: always push local CSV edits via `npm run push` BEFORE this
      #   workflow runs. `npm run push` auto-commits any unsaved CSV changes before pushing.
      - name: Run full data update
        env:
          FOOTBALL_DATA_ORG_TOKEN: ${{ secrets.FOOTBALL_DATA_ORG_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: npm run update:all

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/ EXPERT_PREDICTIONS.csv
          git diff --staged --quiet || git commit -m "chore: daily data update [skip ci]"
          git push
